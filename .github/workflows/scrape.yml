name: BTCC TradFi Scraper

on:
  schedule:
    # 10分おきに実行 (GitHub Actions の最小間隔目安)
    - cron: '*/10 * * * *'
  workflow_dispatch: # 手動実行も可能にする
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # コミット権限を付与

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium

    - name: Run Scraper
      run: python main.py --once
      env:
        BTCC_HEADLESS: 'true'

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add logs/latest.json
        # 変更がある場合のみコミット
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update prices: $(date)" && git push)
