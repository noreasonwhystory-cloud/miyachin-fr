<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTCC TradFi | Premium Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05060a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: #60a5fa;
            --success-color: #34d399;
            --error-color: #fb7185;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --nav-bg: rgba(5, 6, 10, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        header {
            padding: 1rem 8%;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--nav-bg); backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 1.4rem; font-weight: 800; color: #fff; }
        .logo span { color: var(--accent-color); }

        .status-pill {
            font-size: 0.7rem; padding: 0.4rem 0.8rem; border-radius: 99px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            color: var(--text-secondary); display: flex; align-items: center; gap: 6px;
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success-color); }

        .container { padding: 2rem 8%; max-width: 1200px; margin: 0 auto; }

        /* Statistics */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { padding: 1.2rem; text-align: center; }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.4rem; }
        .stat-value { font-size: 1.6rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        /* Filter Controls */
        .filter-section { margin-bottom: 2rem; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .filter-btn {
            padding: 0.6rem 1.2rem; border-radius: 12px; border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.02); color: var(--text-secondary);
            font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        .filter-btn:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .filter-btn.active {
            background: var(--accent-color); color: #000; font-weight: 700; border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.4);
        }

        /* Table */
        .table-container { border-radius: 20px; overflow: hidden; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border); }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 1rem; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; border-bottom: 1px solid var(--glass-border); text-align: left; }
        td { padding: 1rem; border-bottom: 1px solid rgba(255, 255, 244, 0.02); font-family: 'JetBrains Mono', monospace; vertical-align: middle; }
        
        .symbol-ticker { font-size: 1rem; font-weight: 700; color: #fff; font-family: 'Outfit', sans-serif; display: block; }
        .symbol-name { font-size: 0.7rem; color: var(--text-secondary); font-family: 'Outfit', sans-serif; }
        
        .spread-box { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .spread-val { font-size: 0.9rem; font-weight: 600; }
        .spread-badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 700; }
        .low-spread { background: rgba(52, 211, 153, 0.15); color: var(--success-color); }
        .high-spread { background: rgba(251, 113, 133, 0.15); color: var(--error-color); }

        /* Earnings Styles */
        .earnings-date { font-size: 0.85rem; color: #fff; font-weight: 500; }
        .soon-badge {
            font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 4px; border: 1px solid var(--error-color);
            color: var(--error-color); font-weight: 700; text-transform: uppercase; margin-left: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
        }

        /* Category Color Tags */
        .category-dot { width: 4px; height: 12px; border-radius: 2px; display: inline-block; margin-right: 6px; vertical-align: middle; }
        .cat-metals { background: #fbbf24; }
        .cat-indices { background: #818cf8; }
        .cat-forex { background: #34d399; }
        .cat-stocks { background: #60a5fa; }
        .cat-commodities { background: #f87171; }

        /* Responsive - Table 2 Columns on Mobile */
        @media (max-width: 768px) {
            header { padding: 1rem; }
            .container { padding: 1.5rem 1rem; }
            .stats-grid { grid-template-columns: 1fr; gap: 0.8rem; }
            .stat-value { font-size: 2rem; }

            /* 重要：スマホでは2列に絞る */
            .col-hide-mobile { display: none !important; }
            
            th, td { padding: 0.8rem 0.5rem; }
            .symbol-ticker { font-size: 0.9rem; }
            .symbol-name { display: none; }
            .spread-val { font-size: 0.85rem; }

            /* Mobile Earnings Display */
            .mobile-earnings { display: block; font-size: 0.65rem; color: var(--accent-color); margin-top: 4px; }
        }

        @media (min-width: 769px) {
            .mobile-earnings { display: none; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-row { animation: fadeIn 0.3s ease forwards; }

    </style>
</head>
<body>

    <header>
        <div class="logo">📊 <span>TradFi</span> Monitor</div>
        <div class="status-pill">
            <span class="status-dot"></span>
            <span id="last-updated">Syncing...</span>
        </div>
    </header>

    <div class="container">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card glass">
                <div class="stat-label">Lowest</div>
                <div id="stat-min" class="stat-value">--</div>
            </div>
            <div class="stat-card glass">
                <div class="stat-label">Average</div>
                <div id="stat-avg" class="stat-value">--</div>
            </div>
            <div class="stat-card glass">
                <div class="stat-label">Active</div>
                <div id="stat-count" class="stat-value">--</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-section" id="filter-container">
            <!-- Buttons will be injected here -->
        </div>

        <!-- Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Asset</th>
                        <th class="col-hide-mobile">Category</th>
                        <th class="col-hide-mobile">Bid</th>
                        <th class="col-hide-mobile">Ask</th>
                        <th class="col-hide-mobile">Next Earnings</th>
                        <th style="text-align: right">Spread</th>
                    </tr>
                </thead>
                <tbody id="ticker-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // State management
        let allData = [];
        let activeCategories = new Set(['metals', 'indices', 'forex', 'stocks', 'commodities']);
        const CATEGORY_MAP = {
            'metals': 'Metals',
            'indices': 'Indices',
            'forex': 'Forex',
            'stocks': 'Stocks',
            'commodities': 'Commodities'
        };

        async function fetchData() {
            try {
                const response = await fetch('../logs/latest.json?t=' + Date.now());
                const data = await response.json();
                allData = data.results; // Do not filter out failed items, to show them as "--"
                // Update header status
                const timeStr = data.last_updated.includes(' ') ? data.last_updated.split(' ')[1] : data.last_updated;
                document.getElementById('last-updated').innerText = `Live: ${timeStr}`;
                
                renderFilters();
                renderTable();
            } catch (err) {
                console.error(err);
                document.getElementById('last-updated').innerText = 'Sync Error';
            }
        }

        function renderFilters() {
            const container = document.getElementById('filter-container');
            const categories = [...new Set(allData.map(r => r.category))];
            
            // カテゴリのボタンを生成（一度だけ生成し、状態を反映）
            let html = '';
            categories.sort().forEach(cat => {
                const activeClass = activeCategories.has(cat) ? 'active' : '';
                const label = CATEGORY_MAP[cat] || cat;
                html += `<button class="filter-btn ${activeClass}" onclick="toggleCategory('${cat}')">${label}</button>`;
            });
            container.innerHTML = html;
        }

        function toggleCategory(cat) {
            if (activeCategories.has(cat)) {
                activeCategories.delete(cat);
            } else {
                activeCategories.add(cat);
            }
            renderFilters();
            renderTable();
        }

        function isSoon(dateStr) {
            if (!dateStr) return false;
            const target = new Date(dateStr);
            const today = new Date();
            today.setHours(0,0,0,0);
            const diffTime = target - today;
            const diffDays = diffTime / (1000 * 60 * 60 * 24);
            return diffDays >= 0 && diffDays <= 2; // 今日・明日・明後日
        }

        function renderTable() {
            const tbody = document.getElementById('ticker-body');
            const filtered = allData.filter(r => activeCategories.has(r.category));
            
            // Stats
            const succ = filtered.filter(r => r.success);
            if (succ.length > 0) {
                const spreads = succ.map(r => r.spread_pct);
                const min = Math.min(...spreads);
                const avg = spreads.reduce((a, b) => a + b, 0) / spreads.length;
                
                document.getElementById('stat-min').innerText = `${min.toFixed(4)}%`;
                document.getElementById('stat-avg').innerText = `${avg.toFixed(4)}%`;
                document.getElementById('stat-count').innerText = `${succ.length} / ${filtered.length}`;
            } else {
                document.getElementById('stat-min').innerText = `--`;
                document.getElementById('stat-avg').innerText = `--`;
                document.getElementById('stat-count').innerText = `${succ.length} / ${filtered.length}`;
            }

            // Table rows
            filtered.sort((a, b) => {
                if (a.success !== b.success) return b.success ? 1 : -1; 
                return a.spread_pct - b.spread_pct;
            });
            let html = '';
            filtered.forEach((r, idx) => {
                const pctClass = r.success ? (r.spread_pct < 0.05 ? 'low-spread' : (r.spread_pct > 0.3 ? 'high-spread' : '')) : '';
                const catClass = `cat-${r.category}`;
                
                // Earnings UI
                const displayDate = r.earnings_date ? r.earnings_date.substring(5) : '--'; // MM-DD
                const soon = isSoon(r.earnings_date);
                const soonBadge = soon ? '<span class="soon-badge">Soon</span>' : '';
                const earningsHtml = r.earnings_date ? `<span class="earnings-date">${displayDate}${soonBadge}</span>` : '--';
                
                const bidDisplay = r.success ? r.bid.toLocaleString(undefined, {minimumFractionDigits: 2}) : '--';
                const askDisplay = r.success ? r.ask.toLocaleString(undefined, {minimumFractionDigits: 2}) : '--';
                const spreadDisplay = r.success ? r.spread.toFixed(4) : '--';
                const spreadPctDisplay = r.success ? `${r.spread_pct.toFixed(4)}%` : 'N/A';

                html += `
                    <tr class="animate-row" style="animation-delay: ${idx * 0.02}s; ${r.success ? '' : 'opacity: 0.5;'}">
                        <td>
                            <span class="category-dot ${catClass}"></span>
                            <div style="display: inline-block; vertical-align: middle;">
                                <span class="symbol-ticker">${r.symbol}</span>
                                <span class="symbol-name">${r.name}</span>
                                ${r.earnings_date ? `<span class="mobile-earnings">Next: ${displayDate}${soon ? ' (Soon)' : ''}</span>` : ''}
                                ${!r.success ? `<span class="mobile-earnings" style="color:var(--error-color)">Closed / No Data</span>` : ''}
                            </div>
                        </td>
                        <td class="col-hide-mobile"><span style="font-size: 0.7rem; color: var(--text-secondary)">${r.category.toUpperCase()}</span></td>
                        <td class="col-hide-mobile">${bidDisplay}</td>
                        <td class="col-hide-mobile">${askDisplay}</td>
                        <td class="col-hide-mobile">${earningsHtml}</td>
                        <td style="text-align: right">
                            <div class="spread-box">
                                <span class="spread-val">${spreadDisplay}</span>
                                <span class="spread-badge ${pctClass}">${spreadPctDisplay}</span>
                            </div>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Initial load & Polling
        fetchData();
        setInterval(fetchData, 10000); // 10秒おきにフェッチ
    </script>
</body>
</html>
